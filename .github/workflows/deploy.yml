name: CI/CD Frontend - VueJS

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout du code source
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Configuration de PNPM
      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # 3. Configuration de Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      # 4. Installation des dépendances du monorepo
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      # 5. Étape 1 : Build de l'application
      - name: Build Application
        run: pnpm build

      # 6. Étape 2 : Tests unitaires automatisés
      - name: Run Tests
        run: pnpm test

      # 7. Étape 3 : Audit de sécurité des dépendances
      - name: Run Security Audit
        run: pnpm audit --audit-level=high || echo "Audit completed with some warnings"

      # 8. Étape 4 : Déploiement automatique sur Vercel
      # Cette étape ne s'exécute que sur push sur main/master, pas sur les Pull Requests
      - name: Deploy to Vercel (Production)
        if: github.event_name == 'push'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npx vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          npx vercel build --prod --token=$VERCEL_TOKEN
          npx vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
        working-directory: web
