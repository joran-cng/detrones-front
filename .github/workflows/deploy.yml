name: CI/CD Frontend - VueJS

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**.md'

jobs:
  # 1. Job de compilation pour valider les typings et la syntaxe Vite/TS
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Application
        run: pnpm build

  # 2. Job des tests unitaires exécuté en parallèle
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Unit Tests
        run: pnpm test

  # 3. Job d'audit de sécurité des dépendances exécuté en parallèle
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Security Audit
        run: pnpm audit --audit-level=high || echo "Audit completed with some warnings"

  # 4. Job de tests E2E (dépend du succès de la compilation, des tests unitaires et de l'audit)
  e2e-tests:
    runs-on: ubuntu-latest
    needs: [build, unit-tests, security-audit]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Checkout Backend Repo
        uses: actions/checkout@v4
        with:
          repository: joran-cng/detrones-back
          path: backend-repo
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Start Postgres & Redis (Docker Compose)
        working-directory: backend-repo
        run: docker compose up postgres redis -d

      - name: Install Backend Dependencies
        working-directory: backend-repo
        run: pnpm install --frozen-lockfile

      - name: Run Backend Prisma Migrations
        working-directory: backend-repo
        env:
          DATABASE_URL: "postgresql://user:password@localhost:5432/president?schema=public"
        run: pnpm --filter @president/back exec prisma db push

      - name: Install Playwright Browsers
        working-directory: web
        run: npx playwright install chromium --with-deps

      - name: Run Playwright E2E Tests
        env:
          DATABASE_URL: "postgresql://user:password@localhost:5432/president?schema=public"
        run: |
          cd backend-repo
          pnpm run dev &
          echo "Waiting for backend API to respond on port 3000..."
          for i in {1..40}; do curl -s http://localhost:3000/api/health && break || sleep 1; done
          cd ../web
          pnpm run dev &
          echo "Waiting for frontend to respond on port 5173..."
          for i in {1..30}; do curl -s http://localhost:5173 && break || sleep 1; done
          pnpm run test:e2e

  # 5. Job de déploiement (s'exécute uniquement si les tests E2E passent et que c'est un push sur main)
  deploy:
    runs-on: ubuntu-latest
    needs: [build, e2e-tests]
    if: github.event_name == 'push'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy to Vercel (Production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npx vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          npx vercel build --prod --token=$VERCEL_TOKEN
          npx vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
